openapi: 3.0.4

info:
  title: oneLink API
  version: 1.0.0
  description : |
      A simple link-bundling service. Create a named bundle of links and
      retrieve it later by its unique slug.

servers :
  - url: http://localhost:3000
    description: local development

paths:
  /bundles:
    post:
      operationId: createBundle
      summary: Create a new bundle
      description: |
        Accepts a title and a list of links. Returns the created bundle title with a generated slug if none was provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBundleRequest"
      responses:
        "201":
          description: Bundle created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateBundleResponse"
        "400":
          description: Validation error , missing required fields or malformed input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  
  /bundles/{slug}:
    get:
      operationId: getBundleBySlug
      summary: Get a bundle by its slug
      description: Returns the full bundle, including all of its links.
      parameters:
        - name: slug
          in: path
          required: true
          description: The unique URL-safe identifier for the bundle
          schema:
            type: string
      responses:
        "200":
          description: Bundle found successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBundleResponse"
        "404":
          description: No bundle exists with the given slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    CreateBundleRequest:
      type: object
      required:
        - title
        - links
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Name of bundle (used in slug calculation)
        links:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Link"
          description: Links in the bundle
    
    Link:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: URL in bundle
        displayText:
          type: string
          maxLength: 200
          description: Label for the url
        note:
          type: string
          maxLength: 500
          description: Short description for the link
    
    CreateBundleResponse:
      type: object
      required:
        - title
        - slug
        - createdAt
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
          description: Name of bundle (used in slug calculation)
        slug:
          type: string
          description: URL-safe identifier for the bundle
        createdAt:
          type: string
          format: date-time
      
    GetBundleResponse:
      type: object
      required:
        - slug
        - title
        - links
        - createdAt
      properties:
        slug:
          type: string
          description: URL-safe identifier for the bundle
        title:
          type: string
          description: Name of bundle (used in slug calculation)
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
          description: Links in the bundle
        createdAt:
          type: string
          format: date-time
    
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
